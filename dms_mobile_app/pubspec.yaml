name: Driver Monitor
description: Driver Monitoring System Mobile App Client
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5
  google_mlkit_face_mesh_detection: ^0.4.2
  pytorch_lite: ^4.2.5
  http: ^1.1.0
  audioplayers: ^5.2.1
  path_provider: ^2.1.2
  image: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/warning.wav
    - assets/emotion_model.ptl
    - assets/labels.txt
